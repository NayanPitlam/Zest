{% extends "base.html" %}
{% block title %}B.Tech - Zest{% endblock %}
{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item"><a href="/undergrad">Undergrad</a></li>
        <li class="breadcrumb-item active" aria-current="page">B.Tech</li>
    </ol>
</nav>
<div class="text-center mb-4">
    <h1><i class="fas fa-cogs"></i> B.Tech Semesters</h1>
    <p class="lead">Select a semester to view resources.</p>
</div>
<div class="row">
    {% for sem in semesters %}
    <div class="col-md-4">
        <div class="card text-center mb-4">
            <div class="card-body">
                <a href="/undergrad/{{ course }}/{{ sem }}" class="text-decoration-none text-dark">
                    <i class="fas fa-book fa-3x mb-3 text-primary"></i>
                    <h4 class="card-title">Semester {{ sem }}</h4>
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
