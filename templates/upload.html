{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg">
            <div class="card-header text-center bg-primary text-white">
                <h3><i class="fas fa-upload"></i> Upload a New File</h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data" action="/upload">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="fas fa-file-alt"></i></span>
                            </div>
                            <input type="text" class="form-control" id="title" name="title" placeholder="Enter file title" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="level1">Category</label>
                        <select class="form-control" id="level1" name="level1" required>
                            <option value="">-- Select Category --</option>
                            <option value="School">School</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Undergrad">Undergrad</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="level2">Sub-Category</label>
                        <select class="form-control" id="level2" name="level2" required>
                            <option value="">-- Select Sub-Category --</option>
                        </select>
                    </div>
                    <div class="form-group" id="level3-group" style="display: none;">
                        <label for="level3">Semester</label>
                        <select class="form-control" id="level3" name="level3">
                            <option value="">-- Select Semester --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="file">File</label>
                        <div class="custom-file">
                            <input type="file" class="custom-file-input" id="file" name="file" required>
                            <label class="custom-file-label" for="file">Choose file</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">Upload File</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelector('.custom-file-input').addEventListener('change', function (e) {
        var fileName = document.getElementById("file").files[0].name;
        var nextSibling = e.target.nextElementSibling
        nextSibling.innerText = fileName
    })

    const level1 = document.getElementById('level1');
    const level2 = document.getElementById('level2');
    const level3 = document.getElementById('level3');
    const level3Group = document.getElementById('level3-group');

    const levels = {
        "School": [...Array(10).keys()].map(i => `${i+1}th class`),
        "Intermediate": ["11th class", "12th class"],
        "Undergrad": {
            "B.Tech": ["1-1", "1-2", "2-1", "2-2", "3-1", "3-2", "4-1", "4-2"],
            // Add other courses here
        }
    };

    level1.addEventListener('change', (e) => {
        const selected_level1 = e.target.value;
        level2.innerHTML = '<option value="">-- Select Sub-Category --</option>';
        level3.innerHTML = '<option value="">-- Select Semester --</option>';
        level3Group.style.display = 'none';

        if (selected_level1 in levels) {
            const level2_options = levels[selected_level1];
            if (Array.isArray(level2_options)) {
                level2_options.forEach(l2 => {
                    const option = document.createElement('option');
                    option.value = l2;
                    option.textContent = l2;
                    level2.appendChild(option);
                });
            } else { // It's an object for Undergrad
                Object.keys(level2_options).forEach(l2 => {
                    const option = document.createElement('option');
                    option.value = l2;
                    option.textContent = l2;
                    level2.appendChild(option);
                });
            }
        }
    });

    level2.addEventListener('change', (e) => {
        const selected_level1 = level1.value;
        const selected_level2 = e.target.value;
        level3.innerHTML = '<option value="">-- Select Semester --</option>';
        level3Group.style.display = 'none';
        
        if (selected_level1 === "Undergrad" && selected_level2 in levels[selected_level1]) {
            level3Group.style.display = 'block';
            const level3_options = levels[selected_level1][selected_level2];
            level3_options.forEach(l3 => {
                const option = document.createElement('option');
                option.value = l3;
                option.textContent = l3;
                level3.appendChild(option);
            });
        }
    });
</script>
{% endblock %}
