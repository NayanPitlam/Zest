{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1 class="mt-5">Remove File</h1>
    <p>Are you sure you want to remove <strong>{{ filename }}</strong>?</p>
    
    <form method="post" action="/remove/{{ filename }}">
        <button type="submit" class="btn btn-danger">Confirm Removal</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
