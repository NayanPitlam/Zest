{% extends "base.html" %}
{% block title %}Undergrad - Zest{% endblock %}
{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Undergrad</li>
    </ol>
</nav>
<div class="text-center mb-4">
    <h1><i class="fas fa-university"></i> Undergraduate Level</h1>
    <p class="lead">Select a course to view resources.</p>
</div>
<div class="row">
    {% for course in courses %}
    <div class="col-md-6">
        <div class="card text-center mb-4">
            <div class="card-body">
                <a href="/undergrad/{{ course }}" class="text-decoration-none text-dark">
                    <i class="fas fa-graduation-cap fa-3x mb-3 text-primary"></i>
                    <h4 class="card-title">{{ course }}</h4>
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
